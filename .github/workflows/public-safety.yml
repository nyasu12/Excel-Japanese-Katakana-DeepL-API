name: Public Safety

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  public-safety:
    name: Public repository safety
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan tracked files for secrets and sensitive artifacts
        run: python3 scripts/check_public_safety.py
